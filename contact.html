<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Muttz 'N Motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Special+Elite&display=swap" rel="stylesheet">
<style>

:root{
  --cream:#f2e8d5;
  --cream-dark:#e3d3ac;
  --sage:#a7b787;
  --sage-light:#c3ce9f;
  --sage-dark:#8a9c6b;
  --brown:#4a3626;
  --brown-soft:#8a6d52;
  --tan:#cbab8a;
  --terracotta:#e2854f;
  --terracotta-dark:#c96a38;
  --gingham-red:#8b2c1e;
  --pink:#e08a8a;
  --pink-light:#f6dcdc;
  --blue:#7a9dc2;
  --blue-light:#dbe6f2;
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:'Special Elite', 'Courier New', monospace;
  background:var(--cream);
  color:var(--brown);
}
h1,h2,h3,.wordmark,.nav-pill,.logo-text{
  font-family:'Baloo 2', sans-serif;
}

/* ================= GINGHAM FABRIC PATTERNS ================= */
.gingham-red{
  background-color:var(--cream);
  background-image:
    repeating-linear-gradient(90deg, rgba(139,44,30,.5) 0 11px, transparent 11px 22px),
    repeating-linear-gradient(0deg, rgba(139,44,30,.5) 0 11px, transparent 11px 22px);
  background-size:22px 22px;
}
.gingham-pink{
  background-color:var(--pink-light);
  background-image:
    repeating-linear-gradient(90deg, rgba(200,90,90,.55) 0 7px, transparent 7px 14px),
    repeating-linear-gradient(0deg, rgba(200,90,90,.55) 0 7px, transparent 7px 14px);
  background-size:14px 14px;
}
.gingham-blue{
  background-color:var(--blue-light);
  background-image:
    repeating-linear-gradient(90deg, rgba(90,125,170,.55) 0 7px, transparent 7px 14px),
    repeating-linear-gradient(0deg, rgba(90,125,170,.55) 0 7px, transparent 7px 14px);
  background-size:14px 14px;
}

.stripe-bg{
  background-image: repeating-linear-gradient(90deg,
    var(--sage) 0px, var(--sage) 16px,
    var(--sage-light) 16px, var(--sage-light) 34px);
}
.paper-bg{
  background-color:var(--cream);
  background-image:
    radial-gradient(ellipse 220px 140px at 10% 20%, rgba(227,211,172,.55), transparent 70%),
    radial-gradient(ellipse 260px 180px at 85% 75%, rgba(227,211,172,.5), transparent 70%),
    radial-gradient(ellipse 180px 120px at 60% 15%, rgba(227,211,172,.4), transparent 70%),
    radial-gradient(var(--cream-dark) 1px, transparent 1px);
  background-size:auto, auto, auto, 14px 14px;
}

/* ================= TORN PAPER STRIPS ================= */
.torn-strip{
  height:34px;
  width:100%;
  position:relative;
}
.torn-strip.torn-top{
  clip-path:polygon(100% 0%, 100% 100%, 96.4% 62%, 92.9% 68%, 89.3% 58%, 85.7% 100%, 82.1% 100%, 78.6% 100%, 75% 100%, 71.4% 100%, 67.9% 100%, 64.3% 100%, 60.7% 100%, 57.1% 62%, 53.6% 100%, 50% 100%, 46.4% 68%, 42.9% 68%, 39.3% 100%, 35.7% 62%, 32.1% 100%, 28.6% 100%, 25% 68%, 21.4% 100%, 17.9% 100%, 14.3% 100%, 10.7% 62%, 7.1% 58%, 3.6% 58%, 0% 100%, 0% 0%);
}
.torn-strip.torn-bottom{
  transform:scaleY(-1);
  clip-path:polygon(100% 0%, 100% 100%, 96.4% 62%, 92.9% 68%, 89.3% 58%, 85.7% 100%, 82.1% 100%, 78.6% 100%, 75% 100%, 71.4% 100%, 67.9% 100%, 64.3% 100%, 60.7% 100%, 57.1% 62%, 53.6% 100%, 50% 100%, 46.4% 68%, 42.9% 68%, 39.3% 100%, 35.7% 62%, 32.1% 100%, 28.6% 100%, 25% 68%, 21.4% 100%, 17.9% 100%, 14.3% 100%, 10.7% 62%, 7.1% 58%, 3.6% 58%, 0% 100%, 0% 0%);
}

/* ================= CORNER DECORATIONS ================= */
.page-frame{position:relative;}

.corner-btn{
  position:absolute;
  width:52px;height:52px;
  z-index:5;
  clip-path:polygon(8% 0%,92% 4%,100% 88%,90% 100%,6% 96%,0% 14%);
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.corner-btn.tl{top:22px;left:18px;transform:rotate(-12deg);}
.corner-btn.br{bottom:22px;right:18px;transform:rotate(9deg);}
.corner-btn::before,
.corner-btn::after{
  content:"";
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  background:var(--brown);
  opacity:.65;
}
.corner-btn::before{top:16px;left:16px;}
.corner-btn::after{bottom:16px;right:16px;}

.paw-print{
  position:absolute;
  bottom:14px;left:6px;
  width:120px;
  opacity:.4;
  z-index:1;
  pointer-events:none;
}

.bow-corner{
  position:absolute;
  top:0;right:0;
  width:120px;height:100px;
  z-index:5;
  pointer-events:none;
}
.bow-corner .ribbon{
  position:absolute;
  width:150px;height:42px;
  top:30px;left:10px;
  clip-path:polygon(0% 20%,90% 0%,100% 30%,92% 45%,100% 62%,90% 100%,0% 78%,10% 50%);
}
.bow-corner .ribbon.r1{transform:rotate(38deg);}
.bow-corner .ribbon.r2{transform:rotate(-42deg); top:14px; left:16px;}
.bow-corner .knot{
  position:absolute;
  width:26px;height:26px;
  border-radius:6px;
  background:var(--terracotta-dark);
  top:34px;left:52px;
  z-index:2;
  transform:rotate(20deg);
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}

.bunny-ears{
  position:absolute;
  width:100px;height:120px;
  z-index:4;
}
.bunny-ears .ear{
  position:absolute;
  width:44px;height:88px;
  border-radius:50% 50% 45% 45% / 60% 60% 40% 40%;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
}
.bunny-ears .ear.left{top:10px;left:8px;transform:rotate(-14deg);}
.bunny-ears .ear.right{top:0px;left:44px;transform:rotate(10deg);}
.bunny-ears .hole{
  position:absolute;
  width:5px;height:5px;
  border-radius:50%;
  background:#8a4a4a;
  opacity:.6;
}

.flower-deco{
  position:absolute;
  width:70px;height:70px;
  z-index:5;
}
.flower-deco .petal{
  position:absolute;
  width:34px;height:34px;
  border-radius:50%;
  box-shadow:0 2px 4px rgba(0,0,0,.15);
}
.flower-deco .petal.p1{top:0;left:18px;}
.flower-deco .petal.p2{top:18px;left:36px;}
.flower-deco .petal.p3{top:36px;left:18px;}
.flower-deco .petal.p4{top:18px;left:0;}
.flower-deco .center{
  position:absolute;
  top:20px;left:20px;
  width:30px;height:30px;
  border-radius:50%;
  background:var(--cream);
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.flower-deco .center .hole{
  position:absolute;
  width:4px;height:4px;
  border-radius:50%;
  background:var(--brown);
  opacity:.7;
}
.flower-deco .center .hole.h1{top:9px;left:9px;}
.flower-deco .center .hole.h2{top:9px;left:17px;}
.flower-deco .center .hole.h3{top:17px;left:9px;}
.flower-deco .center .hole.h4{top:17px;left:17px;}

.smiley{
  width:32px;height:32px;
  flex-shrink:0;
}
.heart-stamp{
  width:30px;height:30px;
  flex-shrink:0;
}

/* ================= HEADER ================= */
header{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--cream);
}
.nav-row{
  max-width:1200px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 24px 4px 24px;
  gap:16px;
  flex-wrap:wrap;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
}
.logo-badge-img{
  width:56px;height:56px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  flex-shrink:0;
}
.logo-badge{
  position:relative;
  width:64px;height:52px;
}
.logo-badge .splat{
  position:absolute;
  inset:-4px 0 0 -6px;
  width:70px;height:56px;
  background:var(--terracotta);
  border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;
  transform:rotate(-8deg);
  opacity:.9;
}
.logo-badge .logo-text{
  position:relative;
  z-index:2;
  font-weight:800;
  font-size:1.5rem;
  color:var(--cream);
  -webkit-text-stroke:2px var(--brown);
  text-align:center;
  line-height:52px;
}

nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.nav-pill{
  font-family:'Baloo 2', sans-serif;
  font-weight:600;
  font-size:.92rem;
  color:#fff;
  background:linear-gradient(160deg, #eb9a68, var(--terracotta) 55%, var(--terracotta-dark));
  border:none;
  padding:8px 18px;
  border-radius:999px;
  cursor:pointer;
  box-shadow:0 3px 0 rgba(0,0,0,.2), inset 0 1px 1px rgba(255,255,255,.4);
  text-decoration:none;
  transition:all .15s ease;
  display:inline-block;
}
.nav-pill:hover{filter:brightness(1.05);}
.nav-pill.active{
  background:linear-gradient(160deg, var(--sage-light), var(--sage) 60%, var(--sage-dark));
  color:var(--brown);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.25);
  transform:translateY(2px);
}

.title-row{
  max-width:1200px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:14px;
  padding:4px 24px 14px 24px;
  flex-wrap:wrap;
}
.wordmark{
  font-size:clamp(2rem, 5.2vw, 3.6rem);
  font-weight:700;
  letter-spacing:1px;
  line-height:1;
}
.wordmark .a{color:var(--sage-dark); -webkit-text-stroke:2px var(--brown);}
.wordmark .b{color:var(--tan); -webkit-text-stroke:2px var(--brown);}

/* ================= PAGE LAYOUT ================= */
main.page-section{
  position:relative;
  overflow:hidden;
  min-height:60vh;
  display:grid;
  grid-template-columns: 58% 42%;
}
@media (max-width:820px){
  main.page-section{grid-template-columns:1fr; min-height:auto;}
}

.panel-left{
  background:var(--cream);
  padding:60px 56px 80px 90px;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:16px;
}
.panel-right{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:50px;
}

h2.section-title{
  font-size:2.4rem;
  color:var(--brown-soft);
  -webkit-text-stroke:1.4px var(--brown);
  margin:0 0 4px 0;
}

p, li{
  font-size:1rem;
  line-height:1.7;
  letter-spacing:.3px;
}

.highlight{color:var(--terracotta); font-weight:bold;}

ul.offer-list{
  list-style:none;
  margin:0; padding:0;
  color:var(--terracotta-dark);
}
ul.offer-list li{margin-bottom:8px;}

.photo-frame{
  width:min(380px, 82%);
  aspect-ratio:3/4;
  border-radius:40px;
  border:6px solid var(--terracotta);
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.22);
  position:relative;
  z-index:2;
  background:#ddd;
}
.photo-frame img{
  width:100%;height:100%;object-fit:cover;display:block;
}

.cols-2{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
}
.cols-2 > div:not(.divider-v){flex:1; min-width:220px;}
.divider-v{
  width:2px;background:var(--terracotta); align-self:stretch; opacity:.5;
}

.price-row{display:flex; justify-content:space-between; max-width:320px; margin-bottom:6px;}
.price-row .amt{color:var(--terracotta-dark); font-weight:bold;}

.deal-block{margin-bottom:22px;}
.deal-price{color:var(--terracotta); font-weight:bold; font-size:1.15rem;}

.contact-line{margin-bottom:10px; font-size:1.05rem;}
.contact-line a{color:var(--terracotta-dark); text-decoration:none; font-weight:bold;}

.socials{display:flex; gap:18px; margin-top:20px;}
.socials a{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 8px rgba(0,0,0,.2);
  transition:transform .2s ease;
}
.socials a:hover{transform:translateY(-3px);}
.fb{background:#1877f2;}
.ig{background:radial-gradient(circle at 30% 110%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%);}
.tt{background:#111;}
.socials svg{width:28px;height:28px;}

footer{
  text-align:center;
  padding:20px;
  background:var(--brown);
  color:var(--cream);
  font-size:.82rem;
  letter-spacing:.5px;
}


</style>
</head>
